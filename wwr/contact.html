<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta name="description"
      content="Down The River offers premier guided rafting adventures. Discover thrilling rapids and breathtaking river views.">
    <meta name="author" content="Daniel Matos">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us Down The River</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-downriver.jpg" alt="water rafting logo" width="150">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Down The River Company</h1>
        <h3>123 Main River Street</h3>
        <h3>San Cristobal, Dominican Republic</h3>
        <h3>+1 999 999 9999</h3>
        <h3>info@downriver.com</h3>

        <div class="container">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15127.645543621311!2d-70.00594803395329!3d18.42970665888276!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8ea561ba957f08d7%3A0x368984a620cc755!2sSanto%20Domingo%20Country%20Club!5e0!3m2!1ses-419!2sus!4v1775314374617!5m2!1ses-419!2sus"
              width="400" height="350" allowfullscreen="" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"></iframe>

            <form>
                <div class="name-item">
                    <label for="username"><strong>Name</strong></label>
                    <input type="text" name="username" id="username" required>
                </div>

                <div class="email-item">
                    <label for="useremail"><strong>Email</strong></label>
                    <input type="email" name="useremail" id="useremail" required>
                </div>

                <label for="purpose-message"><strong>Message Purpose</strong></label>
                <div class="radio">
                    <input type="radio" name="purpose-message1" id="purpose-message1"
                      value="General Inquiry">
                    <label for="purpose-message1">General inquiry</label>

                    <input type="radio" name="purpose-message2" id="purpose-message2"
                      value="Reservation Question">
                    <label for="purpose-message2">Reservation Question</label>

                    <input type="radio" name="purpose-message3" id="purpose-message3"
                      value="Website Suggestion">
                    <label for="purpose-message3">Website Suggestion</label>
                </div>

                <label for="message"><strong>Message</strong></label>
                <textarea name="message" id="message" placeholder="Type here" rows="4"
                  required></textarea>

                <label class="columnbox">
                    <input type="checkbox" name="subscribe" id="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>
                <button type="submit">Get in touch!</button>
            </form>
        </div>

        <section>
            <h2>We Are Here To Serve You</h2>
            <div class="Adventures">
                <figure>
                    <img src="images/third.jpg" alt="Beautiful Landscape" width="200">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/fourth.jpg" alt="Half Day Adventure" width="200">
                    <figcaption>Employee Profile</figcaption>
                </figure>
                <figure>
                    <img src="images/fifth.jpg" alt="River" width="200">
                    <figcaption>Employee Profile</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook1.png" alt="Facebook Logo" width="50">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram Logo" width="50">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin1.png" alt="LinkedIn Logo" width="50">
            </a>
        </nav>
        <p>
            ©2026 | Down The River | Daniel Matos
        </p>
    </footer>
</body>

</html>
